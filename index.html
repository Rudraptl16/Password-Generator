<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> Password Generator</title>
<link rel="icon" type="x-icon" href="Password.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="panel">
    <button class="mode-toggle" onclick="toggleMode()">🌙 Dark Mode</button>
    <h2>Password Generator</h2>
    
    <div class="output-box">
        <span id="passwordText">Click Generate</span>
        <button class="copy" onclick="copyPassword()">Copy</button>
    </div>

    <div class="controls">
        <label>Length <input type="number" id="length" min="6" max="32" value="12"></label>
        <label>Uppercase <input type="checkbox" id="uppercase" checked></label>
        <label>Lowercase <input type="checkbox" id="lowercase" checked></label>
        <label>Numbers <input type="checkbox" id="numbers" checked></label>
        <label>Symbols <input type="checkbox" id="symbols" checked></label>
    </div>

    <button class="gen-btn" onclick="generatePassword()">Generate Password</button>
</div>

<script src="script.js"></script>
</body>
</html>
